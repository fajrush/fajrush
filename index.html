<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fajrush | Space Explorer</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #020617;
            --card-bg: #0f172a;
            --accent-purple: #a78bfa;
            --accent-cyan: #22d3ee;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px 100px 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* --- BACKGROUND SPACE ANIMATION --- */
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; background: radial-gradient(circle at center, #1e293b 0%, #020617 100%); z-index: -1; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.5; animation: twinkle var(--d) infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } }

        .floating-astronaut {
            position: fixed; bottom: 15%; left: 5%; font-size: 50px; pointer-events: none; z-index: 1;
            animation: floatAstronaut 6s ease-in-out infinite; filter: drop-shadow(0 0 15px rgba(34, 211, 238, 0.3));
        }
        @keyframes floatAstronaut { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-25px) rotate(10deg); } }

        .falling-rocket {
            position: fixed; top: -50px; font-size: 32px; pointer-events: none; z-index: 1; transform: rotate(135deg);
            animation: rocketFall var(--speed) linear infinite;
        }
        @keyframes rocketFall {
            0% { transform: translate(0, 0) rotate(135deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translate(-300px, 100vh) rotate(135deg); opacity: 0; }
        }

        .container { width: 100%; max-width: 460px; z-index: 10; }
        .hidden { display: none !important; }

        /* --- PROFILE VIEW --- */
        .profile { text-align: center; margin-bottom: 32px; }
        .avatar { width: 96px; height: 96px; border-radius: 50%; background: linear-gradient(135deg, var(--accent-purple), var(--accent-cyan)); padding: 3px; margin: 0 auto 16px; box-shadow: 0 0 20px rgba(167, 139, 250, 0.4); }
        .avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; background: var(--bg-color); }
        .profile h1 { font-family: 'Space Grotesk', sans-serif; font-size: 26px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 6px; background: linear-gradient(to right, #fff, var(--accent-cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .profile p { font-size: 14px; color: var(--text-muted); }

        /* --- LINKS --- */
        .links-wrapper { display: flex; flex-direction: column; gap: 14px; margin-bottom: 40px; }
        .link-card { display: flex; align-items: center; justify-content: space-between; padding: 18px 22px; background: rgba(15, 23, 42, 0.6); border: 1px solid var(--border); border-radius: 20px; text-decoration: none; color: var(--text-main); font-weight: 600; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); backdrop-filter: blur(10px); }
        .link-card:hover { transform: translateY(-4px) scale(1.02); border-color: var(--accent-cyan); box-shadow: 0 10px 20px rgba(34, 211, 238, 0.15); }
        .link-left { display: flex; align-items: center; gap: 14px; }
        .link-left i { font-size: 24px; color: var(--accent-cyan); }
        .link-card .arrow { font-size: 18px; color: var(--text-muted); }

        /* --- FEED GRID --- */
        .feed-heading { font-family: 'Space Grotesk', sans-serif; font-size: 16px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; color: var(--accent-purple); }
        .feed-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .feed-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 18px; overflow: hidden; transition: 0.3s; }
        .feed-img-wrapper { position: relative; width: 100%; padding-top: 100%; background: #000; }
        .feed-img-wrapper img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .feed-info { padding: 12px; }
        .feed-caption { font-size: 12px; color: #fff; line-height: 1.4; margin-bottom: 8px; height: 34px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

        /* --- DECORATION TRIGGER --- */
        .admin-trigger {
            position: absolute; top: 25px; right: 25px; width: 44px; height: 44px;
            background: rgba(30, 27, 75, 0.5); border: 1px solid var(--accent-purple);
            color: var(--accent-purple); border-radius: 50%; display: flex;
            justify-content: center; align-items: center; cursor: pointer; z-index: 100;
            box-shadow: 0 0 15px rgba(167, 139, 250, 0.2); transition: 0.3s;
        }
        .admin-trigger:hover { transform: rotate(90deg); background: var(--accent-purple); color: white; box-shadow: 0 0 20px var(--accent-purple); }

        /* --- SPACE DASHBOARD THEME --- */
        .space-panel {
            background: linear-gradient(160deg, rgba(15, 23, 42, 0.95), rgba(30, 27, 75, 0.95));
            border: 2px solid var(--accent-purple); border-radius: 30px; padding: 30px;
            box-shadow: 0 0 40px rgba(124, 58, 237, 0.3); backdrop-filter: blur(20px); position: relative;
        }

        .space-panel h2 { font-family: 'Space Grotesk', sans-serif; font-size: 22px; color: #fff; margin-bottom: 24px; text-align: center; letter-spacing: 1px; }
        
        .input-group { margin-bottom: 14px; }
        .input-group label { color: var(--accent-cyan); display: block; font-weight: 700; font-size: 10px; letter-spacing: 1px; margin-bottom: 8px; text-transform: uppercase; }
        .input-group input, .input-group select, .input-group textarea {
            width: 100%; background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(167, 139, 250, 0.3);
            border-radius: 12px; color: #fff; padding: 14px; transition: 0.3s; outline: none; font-size: 14px;
        }
        .input-group input:focus, .input-group textarea:focus { border-color: var(--accent-cyan); box-shadow: 0 0 10px rgba(34, 211, 238, 0.2); }

        .btn-cosmic {
            width: 100%; background: linear-gradient(90deg, #7c3aed, #22d3ee);
            border: none; border-radius: 12px; padding: 14px; color: white;
            font-weight: 800; font-family: 'Space Grotesk', sans-serif;
            text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: 0.3s;
        }
        .btn-cosmic:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(34, 211, 238, 0.4); }

        .admin-list { margin: 15px 0; max-height: 150px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .admin-item { display: flex; justify-content: space-between; align-items: center; background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border); border-radius: 12px; padding: 12px 15px; }

        .tab-menu { display: flex; gap: 15px; margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .tab-btn { background: none; border: none; color: var(--text-muted); font-weight: 700; font-family: 'Space Grotesk', sans-serif; cursor: pointer; transition: 0.3s; font-size: 14px; }
        .tab-btn.active { color: var(--accent-cyan); text-shadow: 0 0 10px var(--accent-cyan); }

        footer { text-align: center; margin-top: 50px; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="stars" id="starField"></div>
    <div class="floating-astronaut">🧑‍🚀</div>
    <div id="rocketField"></div>

    <div class="admin-trigger" onclick="toggleAdminPanel()">
        <i class="ph-bold ph-planet"></i>
    </div>

    <div class="container">
        
        <div id="userView">
            <div class="profile">
                <div class="avatar"><img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=150" alt="Fajrush"></div>
                <h1>@fajrush33</h1>
                <p>Welcome to the Galaxy, Explorer 🪐</p>
            </div>
            <div class="links-wrapper" id="linksContainer"></div>
            <div class="feed-heading"><i class="ph-bold ph-rocket-launch"></i> Star Feed</div>
            <div class="feed-grid" id="feedContainer"></div>
            <footer>&copy; 2026 Space Tree | Fajrush</footer>
        </div>

        <div id="loginView" class="space-panel hidden">
            <h2>VERIFY IDENTITY</h2>
            <div class="input-group"><label>PILOT ID</label><input type="text" id="username" placeholder="---"></div>
            <div class="input-group"><label>ACCESS KEY</label><input type="password" id="password" placeholder="***"></div>
            <button class="btn-cosmic" onclick="handleLogin()">INITIATE AUTH</button>
            <button class="btn-sec" style="width:100%; background:none; border:none; color:var(--text-muted); cursor:pointer; margin-top:15px; font-size:12px;" onclick="backToLinks()">ABORT MISSION</button>
        </div>

        <div id="dashboardView" class="space-panel hidden">
            <h2>COMMAND CENTER</h2>
            <div class="tab-menu">
                <button class="tab-btn active" id="tabLinkBtn" onclick="switchTab('links')">WORMHOLES</button>
                <button class="tab-btn" id="tabFeedBtn" onclick="switchTab('feeds')">GALAXY FEED</button>
                <button class="tab-btn" id="tabDataBtn" onclick="switchTab('data')">EXPORT</button>
            </div>

            <div id="tabLinksContent">
                <div class="admin-list" id="adminLinksList"></div>
                <div style="margin-top:20px; border-top:1px solid var(--border); padding-top:20px;">
                    <div class="input-group"><label>PORTAL NAME</label><input type="text" id="newTitle" placeholder="Contoh: Instagram"></div>
                    <div class="input-group"><label>COORDINATES (URL)</label><input type="url" id="newUrl" placeholder="https://..."></div>
                    <div class="input-group"><label>SYSTEM ICON</label>
                        <select id="newIcon">
                            <option value="ph-instagram-logo">Instagram</option>
                            <option value="ph-coins">Donasi</option>
                            <option value="ph-game-controller">Game/Top Up</option>
                            <option value="ph-link">Standard</option>
                        </select>
                    </div>
                    <button class="btn-cosmic" onclick="addNewLink()">OPEN PORTAL</button>
                </div>
            </div>

            <div id="tabFeedsContent" class="hidden">
                <div class="admin-list" id="adminFeedsList"></div>
                <div style="margin-top:20px; border-top:1px solid var(--border); padding-top:20px;">
                    <div class="input-group"><label>CAPTURE IMAGE</label><input type="file" id="postImage" accept="image/*"></div>
                    <div class="input-group"><label>TRANSMISSION DATA</label><textarea id="postCaption" rows="2" placeholder="Tulis caption..."></textarea></div>
                    <button class="btn-cosmic" onclick="addNewPost()">TRANSMIT TO FEED</button>
                </div>
            </div>

            <div id="tabDataContent" class="hidden">
                <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 15px; line-height: 1.5;">
                    Klik tombol di bawah untuk menyalin kode data terbaru lu, lalu paste kodenya ke baris `KODE_MASTER_DATA` di file HTML lu biar tersimpan permanen secara global!
                </p>
                <button class="btn-cosmic" onclick="exportMasterData()">SALIN KODE DATA GLOBAL</button>
            </div>

            <button class="btn-sec" style="width:100%; border:1px solid rgba(239, 68, 68, 0.4); color:#ef4444; border-radius:12px; padding:12px; margin-top:20px; cursor:pointer; background:none; font-weight:700;" onclick="handleLogout()">TERMINATE SESSION</button>
        </div>
    </div>

    <script>
        // =========================================================================
        // 🔮 KODE MASTER DATA (TEMPAT MENYIMPAN DATA SECARA GLOBAL AGAR DILIHAT SEMUA ORANG)
        // Lu bisa paste kode hasil tombol EXPORT di sini agar link & foto lu permanen.
        // =========================================================================
        const KODE_MASTER_DATA = null; 

        // --- DATA DEFAULT AWAL BANGET (KALAU KOSONG) ---
        const defaultLinks = [
            { id: 1, title: 'Instagram', url: 'https://www.instagram.com/fajrush33', icon: 'ph-instagram-logo' },
            { id: 2, title: 'Donasi', url: 'https://saweria.co/fajrush', icon: 'ph-coins' },
            { id: 3, title: 'Top Up game terpercaya', url: 'https://saweria.co/fajrush/toko-top-up', icon: 'ph-game-controller' }
        ];
        const defaultPosts = [
            { id: 101, image_url: 'https://images.unsplash.com/photo-1542751371-adc38448a05e?w=400', caption: 'Setup gaming baru nih bro, gas mabar! 🕹️', likes: 12 },
            { id: 102, image_url: 'https://images.unsplash.com/photo-1511512578047-dfb367046420?w=400', caption: 'Fokus grind sampe dapet rank mythical glory! 🔥', likes: 24 }
        ];

        // --- SISTEM MEMORI INTERNAL ---
        let links = defaultLinks;
        let posts = defaultPosts;

        if (KODE_MASTER_DATA) {
            links = KODE_MASTER_DATA.links;
            posts = KODE_MASTER_DATA.posts;
        } else if (localStorage.getItem('fajrush_local_links')) {
            links = JSON.parse(localStorage.getItem('fajrush_local_links'));
            posts = JSON.parse(localStorage.getItem('fajrush_local_posts'));
        }

        const adminAccount = { username: "fajrush", password: "fajrush2007" };

        function createStars() {
            const field = document.getElementById('starField');
            for(let i=0; i<80; i++) {
                let star = document.createElement('div'); star.className = 'star';
                star.style.left = Math.random() * 100 + '%'; star.style.top = Math.random() * 100 + '%';
                let size = Math.random() * 2 + 1; star.style.width = size + 'px'; star.style.height = size + 'px';
                star.style.setProperty('--d', (Math.random() * 3 + 2) + 's'); field.appendChild(star);
            }
        }

        function createFallingRockets() {
            const field = document.getElementById('rocketField');
            for(let i=0; i<4; i++) {
                let rocket = document.createElement('div'); rocket.className = 'falling-rocket'; rocket.innerText = '🚀';
                rocket.style.left = (Math.random() * 60 + 30) + '%'; rocket.style.setProperty('--speed', (Math.random() * 4 + 4) + 's');
                rocket.style.animationDelay = (Math.random() * 6) + 's'; field.appendChild(rocket);
            }
        }

        function loadData() {
            document.getElementById('linksContainer').innerHTML = links.map(link => `
                <a href="${link.url}" target="_blank" class="link-card">
                    <div class="link-left"><i class="ph-bold ${link.icon}"></i><span>${link.title}</span></div>
                    <i class="ph-bold ph-caret-right arrow"></i>
                </a>
            `).join('');

            document.getElementById('adminLinksList').innerHTML = links.map(link => `
                <div class="admin-item"><span>${link.title}</span>
                    <i class="ph-bold ph-trash" style="color:#ef4444; cursor:pointer;" onclick="deleteLink(${link.id})"></i>
                </div>
            `).join('');

            document.getElementById('feedContainer').innerHTML = posts.map(post => `
                <div class="feed-card">
                    <div class="feed-img-wrapper"><img src="${post.image_url}" alt="Post"></div>
                    <div class="feed-info">
                        <div class="feed-caption">${post.caption}</div>
                        <button style="background:none; border:none; color:var(--accent-cyan); font-weight:800; font-size:11px; cursor:pointer;" onclick="addLike(${post.id})">✨ ${post.likes} EXPLORED</button>
                    </div>
                </div>
            `).join('');

            document.getElementById('adminFeedsList').innerHTML = posts.map(post => `
                <div class="admin-item"><span style="font-size:12px; opacity:0.7; max-width:200px; overflow:hidden;">${post.caption}</span>
                    <i class="ph-bold ph-trash" style="color:#ef4444; cursor:pointer;" onclick="deletePost(${post.id})"></i>
                </div>
            `).join('');
        }

        function saveData() {
            localStorage.setItem('fajrush_local_links', JSON.stringify(links));
            localStorage.setItem('fajrush_local_posts', JSON.stringify(posts));
            loadData();
        }

        function addNewLink() {
            const title = document.getElementById('newTitle').value;
            const url = document.getElementById('newUrl').value;
            const icon = document.getElementById('newIcon').value;
            if(!title || !url) return alert('Isi lengkap bro!');
            links.push({ id: Date.now(), title, url, icon });
            document.getElementById('newTitle').value = ''; document.getElementById('newUrl').value = '';
            saveData();
        }

        function deleteLink(id) {
            if(confirm('Hapus link?')) { links = links.filter(l => l.id !== id); saveData(); }
        }

        function addNewPost() {
            const fileInput = document.getElementById('postImage');
            const caption = document.getElementById('postCaption').value;
            if(fileInput.files.length === 0 || !caption) return alert('Isi lengkap bro!');

            const file = fileInput.files[0];
            const reader = new FileReader();
            reader.onloadend = function () {
                posts.unshift({ id: Date.now(), image_url: reader.result, caption, likes: 0 });
                fileInput.value = ''; document.getElementById('postCaption').value = '';
                saveData();
                alert('Berhasil terposting di HP lu! Jangan lupa masuk tab EXPORT biar bisa dilihat semua orang! 🚀');
            };
            reader.readAsDataURL(file);
        }

        function deletePost(id) {
            if(confirm('Hapus post?')) { posts = posts.filter(p => p.id !== id); saveData(); }
        }

        function addLike(id) {
            posts = posts.map(p => { if(p.id === id) p.likes++; return p; });
            saveData();
        }

        function exportMasterData() {
            const dataObj = { links: links, posts: posts };
            const jsonString = JSON.stringify(dataObj);
            navigator.clipboard.writeText(jsonString);
            alert('GOKIL! Kode rahasia data lu berhasil disalin! Sekarang lu buka kodingan index.html lu, terus ganti tulisan `const KODE_MASTER_DATA = null;` menjadi `const KODE_MASTER_DATA = ' + jsonString + ';`. Terus update ke Vercel!');
        }

        function toggleAdminPanel() {
            const userView = document.getElementById('userView');
            if (!userView.classList.contains('hidden')) {
                userView.classList.add('hidden');
                if (sessionStorage.getItem('isAdminLoggedIn') === 'true') { document.getElementById('dashboardView').classList.remove('hidden'); }
                else { document.getElementById('loginView').classList.remove('hidden'); }
            } else { backToLinks(); }
        }
        function backToLinks() {
            document.getElementById('userView').classList.remove('hidden');
            document.getElementById('loginView').classList.add('hidden');
            document.getElementById('dashboardView').classList.add('hidden');
        }
        function switchTab(tab) {
            document.getElementById('tabLinksContent').classList.toggle('hidden', tab !== 'links');
            document.getElementById('tabFeedsContent').classList.toggle('hidden', tab !== 'feeds');
            document.getElementById('tabDataContent').classList.toggle('hidden', tab !== 'data');
            document.getElementById('tabLinkBtn').classList.toggle('active', tab === 'links');
            document.getElementById('tabFeedBtn').classList.toggle('active', tab === 'feeds');
            document.getElementById('tabDataBtn').classList.toggle('active', tab === 'data');
        }
        function handleLogin() {
            if(document.getElementById('username').value === adminAccount.username && document.getElementById('password').value === adminAccount.password) {
                sessionStorage.setItem('isAdminLoggedIn', 'true');
                document.getElementById('loginView').classList.add('hidden'); document.getElementById('dashboardView').classList.remove('hidden');
            } else { alert('ACCESS DENIED.'); }
        }
        function handleLogout() { sessionStorage.removeItem('isAdminLoggedIn'); backToLinks(); }

        createStars(); createFallingRockets(); loadData();
    </script>
</body>
</html>
